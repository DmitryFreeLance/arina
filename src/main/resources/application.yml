server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: max-helpdesk-bot
  datasource:
    url: jdbc:h2:file:${DB_PATH:/data/max-bot-db};AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  h2:
    console:
      enabled: false

logging:
  level:
    root: INFO
    ru.arina.maxbot: INFO

bot:
  token: ${BOT_TOKEN}
  api-base-url: ${BOT_API_BASE_URL:https://platform-api2.max.ru}
  webhook-url: ${WEBHOOK_URL:}
  webhook-secret: ${WEBHOOK_SECRET:}
  app-base-url: ${APP_BASE_URL:http://localhost:8080}
  company-name: ${COMPANY_NAME:Управляющая компания "Комфорт Сервис"}
  admin-ids: ${ADMIN_IDS:}
  notify-on-startup: ${NOTIFY_ON_STARTUP:false}
  page-size: ${PAGE_SIZE:8}
